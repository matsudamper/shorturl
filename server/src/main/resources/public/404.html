<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 | shorturl</title>
    <style>
        :root {
            color-scheme: light;
            --bg-top: #f7f4ed;
            --bg-bottom: #e6efe8;
            --card: rgba(255, 255, 255, 0.92);
            --text-main: #18221d;
            --text-muted: #5c6a62;
            --line: rgba(24, 34, 29, 0.12);
            --accent: #295c46;
            --accent-soft: #edf6f1;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", "Noto Sans JP", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 38%),
                linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
        }

        main {
            width: min(100%, 560px);
        }

        .card {
            padding: 32px;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: var(--card);
            box-shadow: 0 24px 60px rgba(24, 34, 29, 0.12);
            backdrop-filter: blur(10px);
        }

        .code {
            margin: 0 0 8px;
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 6vw, 3.4rem);
            line-height: 1;
        }

        p {
            margin: 0;
        }

        .message {
            margin-top: 16px;
            font-size: 1rem;
            line-height: 1.7;
            color: var(--text-muted);
        }

        .path {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 14px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 0.92rem;
            word-break: break-all;
        }

        .link {
            display: inline-flex;
            margin-top: 24px;
            padding: 12px 18px;
            border-radius: 999px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }

        .link:hover {
            opacity: 0.92;
        }

        @media (max-width: 640px) {
            .card {
                padding: 24px;
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>
<main>
    <div class="card">
        <p class="code">404</p>
        <h1>Page Not Found</h1>
        <p class="message">お探しのページは見つかりませんでした。</p>
        <p class="path" id="requested-path">Requested path: /</p>
        <a class="link" href="/admin/">管理画面へ</a>
    </div>
</main>
<script>
    const requestedPath = document.getElementById("requested-path");
    if (requestedPath) {
        requestedPath.textContent = `Requested path: ${window.location.pathname || "/"}`;
    }
</script>
</body>
</html>

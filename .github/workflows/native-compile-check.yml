name: Native Compile Check

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  native-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up GraalVM
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'graalvm'
          java-version: '24'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build GraalVM native image (dev)
        run: |
          ./gradlew nativeCompile -PserverBuildProfile=dev
          mv server/build/native/nativeCompile/shorturl-dev* server/build/native/nativeCompile/shorturl-prod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: shorturl-test:pr

      - name: Test admin endpoint
        uses: ./.github/actions/test-docker-image
        with:
          image-tag: shorturl-test:pr

name: Native Compile Check

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  native-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up GraalVM
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'graalvm'
          java-version: '24'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build GraalVM native image (dev)
        run: ./gradlew nativeCompile -PserverBuildProfile=dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: shorturl-test:pr

      - name: Test admin endpoint
        run: |
          docker run -d \
            --name shorturl-test \
            -p 8080:8080 \
            -e DATA_DIR=/tmp/data \
            shorturl-test:pr

          echo "Waiting for server to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/healthz > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "Timed out waiting for server"
              docker logs shorturl-test
              docker rm -f shorturl-test || true
              exit 1
            fi
            sleep 1
          done

          echo "Testing admin/ endpoint..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/admin/)
          echo "admin/ responded with HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "000" ]; then
            echo "ERROR: No response from admin/"
            docker logs shorturl-test
            docker rm -f shorturl-test || true
            exit 1
          fi
          echo "admin/ endpoint test passed"

          docker rm -f shorturl-test
